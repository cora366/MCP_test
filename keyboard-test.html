<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>키보드 입력 테스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
      padding: 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      color: #333;
      letter-spacing: 0.5px;
    }

    /* 입력 표시창 */
    #display {
      width: 100%;
      max-width: 860px;
      background: #fff;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      padding: 16px 20px;
      min-height: 64px;
      font-size: 18px;
      color: #222;
      letter-spacing: 1px;
      word-break: break-all;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #display-text {
      flex: 1;
      white-space: pre-wrap;
    }

    #display-text:empty::before {
      content: '키를 눌러보세요...';
      color: #bbb;
    }

    #clear-btn {
      background: none;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    #clear-btn:hover {
      border-color: #ccc;
      color: #555;
      background: #fafafa;
    }

    /* 키보드 컨테이너 */
    .keyboard {
      background: #fff;
      border: 1.5px solid #e0e0e0;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      width: 100%;
      max-width: 860px;
    }

    .row {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    /* 기본 키 스타일 */
    .key {
      background: #fafafa;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      height: 48px;
      min-width: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s, border-color 0.1s, transform 0.08s, box-shadow 0.1s;
      position: relative;
      padding: 0 10px;
      box-shadow: 0 2px 0 #d8d8d8;
      flex-shrink: 0;
    }

    .key:hover {
      background: #f0f0f0;
      border-color: #ccc;
    }

    .key.active {
      background: #222;
      border-color: #111;
      color: #fff;
      box-shadow: 0 1px 0 #111;
      transform: translateY(1px);
    }

    /* 특수 키 너비 */
    .key.w-backspace { min-width: 94px; }
    .key.w-tab       { min-width: 72px; }
    .key.w-caps      { min-width: 82px; }
    .key.w-enter     { min-width: 104px; }
    .key.w-lshift    { min-width: 116px; }
    .key.w-rshift    { min-width: 116px; }
    .key.w-lctrl,
    .key.w-rctrl     { min-width: 72px; }
    .key.w-lalt,
    .key.w-ralt      { min-width: 68px; }
    .key.w-space     { min-width: 300px; }
    .key.w-fn        { min-width: 56px; font-size: 11px; color: #999; }

    /* 수식키 색상 */
    .key.modifier {
      background: #f5f5f5;
      color: #666;
      font-size: 11px;
    }
    .key.modifier:hover {
      background: #ebebeb;
    }
    .key.modifier.active {
      background: #222;
      color: #fff;
    }

    /* 최근 입력 표시 */
    #last-key {
      font-size: 13px;
      color: #aaa;
      text-align: center;
    }

    #last-key span {
      color: #555;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>키보드 입력 테스트</h1>

  <div id="display">
    <div id="display-text"></div>
    <button id="clear-btn">지우기</button>
  </div>

  <div class="keyboard" id="keyboard">
    <!-- Row 0: Function keys -->
    <div class="row">
      <div class="key modifier w-fn" data-key="Escape">ESC</div>
      <div class="key modifier w-fn" data-key="F1">F1</div>
      <div class="key modifier w-fn" data-key="F2">F2</div>
      <div class="key modifier w-fn" data-key="F3">F3</div>
      <div class="key modifier w-fn" data-key="F4">F4</div>
      <div class="key modifier w-fn" data-key="F5">F5</div>
      <div class="key modifier w-fn" data-key="F6">F6</div>
      <div class="key modifier w-fn" data-key="F7">F7</div>
      <div class="key modifier w-fn" data-key="F8">F8</div>
      <div class="key modifier w-fn" data-key="F9">F9</div>
      <div class="key modifier w-fn" data-key="F10">F10</div>
      <div class="key modifier w-fn" data-key="F11">F11</div>
      <div class="key modifier w-fn" data-key="F12">F12</div>
    </div>

    <!-- Row 1: Number row -->
    <div class="row">
      <div class="key" data-key="`" data-shift="~">`</div>
      <div class="key" data-key="1" data-shift="!">1</div>
      <div class="key" data-key="2" data-shift="@">2</div>
      <div class="key" data-key="3" data-shift="#">3</div>
      <div class="key" data-key="4" data-shift="$">4</div>
      <div class="key" data-key="5" data-shift="%">5</div>
      <div class="key" data-key="6" data-shift="^">6</div>
      <div class="key" data-key="7" data-shift="&amp;">7</div>
      <div class="key" data-key="8" data-shift="*">8</div>
      <div class="key" data-key="9" data-shift="(">9</div>
      <div class="key" data-key="0" data-shift=")">0</div>
      <div class="key" data-key="-" data-shift="_">-</div>
      <div class="key" data-key="=" data-shift="+">=</div>
      <div class="key modifier w-backspace" data-key="Backspace">← Back</div>
    </div>

    <!-- Row 2: QWERTY -->
    <div class="row">
      <div class="key modifier w-tab" data-key="Tab">Tab</div>
      <div class="key" data-key="q">Q</div>
      <div class="key" data-key="w">W</div>
      <div class="key" data-key="e">E</div>
      <div class="key" data-key="r">R</div>
      <div class="key" data-key="t">T</div>
      <div class="key" data-key="y">Y</div>
      <div class="key" data-key="u">U</div>
      <div class="key" data-key="i">I</div>
      <div class="key" data-key="o">O</div>
      <div class="key" data-key="p">P</div>
      <div class="key" data-key="[" data-shift="{">[</div>
      <div class="key" data-key="]" data-shift="}">]</div>
      <div class="key" data-key="\" data-shift="|">\</div>
    </div>

    <!-- Row 3: ASDF -->
    <div class="row">
      <div class="key modifier w-caps" data-key="CapsLock" id="caps-key">Caps</div>
      <div class="key" data-key="a">A</div>
      <div class="key" data-key="s">S</div>
      <div class="key" data-key="d">D</div>
      <div class="key" data-key="f">F</div>
      <div class="key" data-key="g">G</div>
      <div class="key" data-key="h">H</div>
      <div class="key" data-key="j">J</div>
      <div class="key" data-key="k">K</div>
      <div class="key" data-key="l">L</div>
      <div class="key" data-key=";" data-shift=":">;</div>
      <div class="key" data-key="'" data-shift='"'>'</div>
      <div class="key modifier w-enter" data-key="Enter">Enter ↵</div>
    </div>

    <!-- Row 4: ZXCV -->
    <div class="row">
      <div class="key modifier w-lshift" data-key="ShiftLeft">Shift ⇧</div>
      <div class="key" data-key="z">Z</div>
      <div class="key" data-key="x">X</div>
      <div class="key" data-key="c">C</div>
      <div class="key" data-key="v">V</div>
      <div class="key" data-key="b">B</div>
      <div class="key" data-key="n">N</div>
      <div class="key" data-key="m">M</div>
      <div class="key" data-key="," data-shift="<">,</div>
      <div class="key" data-key="." data-shift=">">.</div>
      <div class="key" data-key="/" data-shift="?">/</div>
      <div class="key modifier w-rshift" data-key="ShiftRight">Shift ⇧</div>
    </div>

    <!-- Row 5: Bottom row -->
    <div class="row">
      <div class="key modifier w-lctrl" data-key="ControlLeft">Ctrl</div>
      <div class="key modifier w-fn" data-key="Meta">⌘</div>
      <div class="key modifier w-lalt" data-key="AltLeft">Alt</div>
      <div class="key w-space" data-key=" "> </div>
      <div class="key modifier w-ralt" data-key="AltRight">Alt</div>
      <div class="key modifier w-fn" data-key="ContextMenu">☰</div>
      <div class="key modifier w-rctrl" data-key="ControlRight">Ctrl</div>
      <div class="key modifier" data-key="ArrowLeft">◀</div>
      <div class="key modifier" data-key="ArrowUp" style="height:20px;min-width:48px;font-size:10px;">▲</div>
      <div class="key modifier" data-key="ArrowDown" style="height:20px;min-width:48px;font-size:10px;">▼</div>
      <div class="key modifier" data-key="ArrowRight">▶</div>
    </div>
  </div>

  <div id="last-key">마지막 입력: <span id="last-key-name">—</span></div>

  <script>
    const displayText = document.getElementById('display-text');
    const clearBtn = document.getElementById('clear-btn');
    const lastKeyName = document.getElementById('last-key-name');

    let text = '';
    let shiftActive = false;
    let capsActive = false;

    function updateDisplay() {
      displayText.textContent = text;
    }

    function flashKey(keyEl) {
      keyEl.classList.add('active');
      setTimeout(() => keyEl.classList.remove('active'), 150);
    }

    function findKeyEl(code, key) {
      return document.querySelector(`[data-key="${code}"]`)
          || document.querySelector(`[data-key="${key}"]`)
          || document.querySelector(`[data-key="${key.toLowerCase()}"]`);
    }

    function typeChar(char) {
      if (char === 'Backspace') {
        text = text.slice(0, -1);
      } else if (char === 'Enter') {
        text += '\n';
      } else if (char === 'Tab') {
        text += '    ';
      } else if (char === ' ') {
        text += ' ';
      } else if (char.length === 1) {
        text += char;
      }
      updateDisplay();
    }

    // 실제 키보드 입력
    document.addEventListener('keydown', (e) => {
      // Shift 상태 추적
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
        shiftActive = true;
        document.querySelectorAll('[data-key="ShiftLeft"], [data-key="ShiftRight"]')
          .forEach(el => el.classList.add('active'));
        return;
      }
      if (e.code === 'CapsLock') {
        capsActive = !capsActive;
        const capsEl = document.getElementById('caps-key');
        capsEl.classList.toggle('active', capsActive);
        lastKeyName.textContent = 'CapsLock';
        e.preventDefault();
        return;
      }

      const keyEl = findKeyEl(e.code, e.key);
      if (keyEl) flashKey(keyEl);

      lastKeyName.textContent = e.key === ' ' ? 'Space' : e.key;

      if (!['Control','Alt','Meta','Shift','F1','F2','F3','F4','F5','F6',
            'F7','F8','F9','F10','F11','F12','Escape','ContextMenu'].includes(e.key)) {
        if (e.key === 'Backspace') { typeChar('Backspace'); e.preventDefault(); }
        else if (e.key === 'Enter') { typeChar('Enter'); e.preventDefault(); }
        else if (e.key === 'Tab')   { typeChar('Tab'); e.preventDefault(); }
        else if (e.key.length === 1) { typeChar(e.key); e.preventDefault(); }
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
        shiftActive = false;
        document.querySelectorAll('[data-key="ShiftLeft"], [data-key="ShiftRight"]')
          .forEach(el => el.classList.remove('active'));
      }
    });

    // 화면 키보드 클릭
    document.querySelectorAll('.key').forEach(key => {
      key.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const k = key.dataset.key;

        if (k === 'ShiftLeft' || k === 'ShiftRight') {
          shiftActive = !shiftActive;
          document.querySelectorAll('[data-key="ShiftLeft"], [data-key="ShiftRight"]')
            .forEach(el => el.classList.toggle('active', shiftActive));
          lastKeyName.textContent = 'Shift';
          return;
        }

        if (k === 'CapsLock') {
          capsActive = !capsActive;
          key.classList.toggle('active', capsActive);
          lastKeyName.textContent = 'CapsLock';
          return;
        }

        flashKey(key);
        lastKeyName.textContent = k === ' ' ? 'Space' : k;

        if (k === 'Backspace') {
          typeChar('Backspace');
        } else if (k === 'Enter') {
          typeChar('Enter');
        } else if (k === 'Tab') {
          typeChar('Tab');
        } else if (k === ' ') {
          typeChar(' ');
        } else if (k.length === 1) {
          const upper = capsActive !== shiftActive;
          const shifted = shiftActive && key.dataset.shift;
          const char = shifted ? key.dataset.shift
                     : upper   ? k.toUpperCase()
                                : k.toLowerCase();
          typeChar(char);
          if (shiftActive) {
            shiftActive = false;
            document.querySelectorAll('[data-key="ShiftLeft"], [data-key="ShiftRight"]')
              .forEach(el => el.classList.remove('active'));
          }
        }
      });
    });

    clearBtn.addEventListener('click', () => {
      text = '';
      updateDisplay();
      lastKeyName.textContent = '—';
    });
  </script>
</body>
</html>
